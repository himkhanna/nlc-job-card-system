spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/nlc_jobcards}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate validates only
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:NLC-JobCard-SuperSecret-Key-2025-IDCTechnologies-MinLength32Chars}
  expiry-minutes: ${JWT_EXPIRY_MINUTES:60}
  refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
  issuer: ${JWT_ISSUER:nlc-api}
  audience: ${JWT_AUDIENCE:nlc-frontend}

app:
  allowed-origin: ${ALLOWED_ORIGIN:http://localhost:3000}

compreface:
  url: ${COMPREFACE_URL:http://localhost:8000}
  api-key: ${COMPREFACE_API_KEY:}
  confidence-threshold: ${COMPREFACE_CONFIDENCE_THRESHOLD:0.85}

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.nlc: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
